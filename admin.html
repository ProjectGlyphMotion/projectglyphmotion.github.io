<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Project GlyphMotion</title>
    <meta name="description" content="Secure administrative access to Project GlyphMotion for managing video content and tracking analytics.">
    <link rel="icon" type="image/x-icon" href="images/project-glyph-motion.ico">
    <link rel="manifest" href="/manifest.json"> <!-- IMPORTANT: manifest.json link should always be relative to the root if using a custom domain --> <!-- PWA: Link to manifest file -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>

        /* -- NEW BACKGROUND STYLES -- */
        body {
            background-color: #030303;
            color: #e4e4e7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .bg-glow-main {
            position: fixed; top: -30vh; left: 50%; transform: translateX(-50%);
            width: 150vw; height: 100vh;
            background: radial-gradient(ellipse at 50% 30%, rgba(245, 158, 11, 0.15) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
            will-change: transform;
        }

        .bg-mesh {
            position: fixed; inset: 0; background-size: 35px 35px;
            background-position: center top; 
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            z-index: 1; pointer-events: none;
        }

        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 2;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; opacity: 0.3;
        }


        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0A0F; /* Very dark background */
            color: #EDEDF3; /* Light text color */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden; /* Prevent scroll for glow effects */
        }

        /* Background Glow Elements */
        .background-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10; /* Behind content */
            overflow: hidden;
            pointer-events: none; /* Don't interfere with mouse events */
        }
        .glow-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            mix-blend-mode: screen; /* For vibrant overlay effect */
            filter: blur(100px); /* Heavy blur */
            will-change: transform, opacity; /* Optimize animations */
        }
        .glow-1 {
            width: clamp(400px, 60vw, 800px);
            height: clamp(400px, 60vw, 800px);
            background: radial-gradient(circle at center, #FDA136 0%, rgba(253, 161, 54, 0) 70%);
            filter: blur(120px);
            top: -20%;
            left: -15%;
            animation: subtleDrift 35s infinite alternate ease-in-out;
        }
        .glow-2 {
            width: clamp(350px, 50vw, 700px);
            height: clamp(350px, 50vw, 700px);
            background: radial-gradient(circle at center, #FF5733 0%, rgba(255, 87, 51, 0) 70%);
            filter: blur(100px);
            bottom: -15%;
            right: -10%;
            animation: subtleDrift 40s infinite alternate-reverse ease-in-out 2s;
        }
        .glow-3 {
            width: clamp(300px, 40vw, 500px);
            height: clamp(300px, 40vw, 500px);
            background: radial-gradient(circle at center, #FF8C00 0%, rgba(255, 140, 0, 0) 70%);
            filter: blur(90px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.15;
            animation: subtlePulse 20s infinite alternate ease-in-out;
        }
        @keyframes subtleDrift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            50% { opacity: 0.25; }
            100% { transform: translate(calc(8vw - 20px), calc(8vh - 10px)) scale(1.2); opacity: 0.1; }
        }
        @keyframes subtlePulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; }
        }

        .content-card {
            background: linear-gradient(180deg, rgba(30, 25, 35, 0.45) 0%, rgba(15, 12, 18, 0.85) 100%);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(245, 158, 11, 0.2); border-top: 1px solid rgba(245, 158, 11, 0.35);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.9), inset 0 1px 20px rgba(245, 158, 11, 0.05);
            border-radius: 1.25rem; position: relative;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        .content-card:hover {
            transform: translateY(-4px);
            background: linear-gradient(180deg, rgba(35, 30, 40, 0.55) 0%, rgba(20, 15, 25, 0.95) 100%);
            border-color: rgba(245, 158, 11, 0.4); border-top-color: rgba(245, 158, 11, 0.6);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.8), 0 0 35px -5px rgba(245, 158, 11, 0.25), inset 0 1px 20px rgba(245, 158, 11, 0.1);
        }

        .page-title {
            font-family: 'Press Start 2P', cursive;
            font-weight: normal;
            background: linear-gradient(to right, #FDA136, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
            line-height: 1; /* Adjusted for single line appearance */
            white-space: nowrap; /* Ensure text stays on one line */
        }

        .btn {
            @apply font-semibold py-2 px-4 rounded-lg shadow-md transition-all duration-200 ease-in-out transform hover:scale-103;
        }
        .btn-custom-primary {
            @apply bg-gradient-to-br from-orange-500 to-amber-500 text-white focus:ring-orange-400 shadow-orange-600/40 hover:from-orange-600 hover:to-amber-600;
        }
        .info-banner.error-banner {
            background-color: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
            border-left-color: #FF5733;
            color: #FFD7D7;
        }
        /* Style for password toggle icon */
        .password-toggle-icon {
            /* Tailwind classes are handling the positioning, keeping this clear */
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        retro: ['"Press Start 2P"', 'cursive'],
                    },
                    colors: {
                        black: '#030303',
                        surface: '#0a0a0c',
                    }
                }
            }
        }
    </script>

</head>
<body class="relative min-h-screen flex flex-col items-center">

    <div class="bg-glow-main"></div>
    <div class="bg-mesh"></div>
    <div class="scanlines"></div>

    <div class="background-glow-container">
        <div class="glow-element glow-1"></div>
        <div class="glow-element glow-2"></div>
        <div class="glow-element glow-3"></div>
    </div>

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 md:px-8 top-10 md:top-14 pb-32 flex flex-col items-center">
        
        <header class="flex flex-col items-center justify-center text-center mb-10 relative z-10 w-full">
            <h2 class="text-zinc-500 font-mono font-bold uppercase tracking-[0.4em] text-xs sm:text-sm mb-4 flex items-center gap-3">
                <span class="w-8 h-px bg-zinc-700"></span> Admin Access <span class="w-8 h-px bg-zinc-700"></span>
            </h2>
            <h1 class="font-retro text-3xl sm:text-4xl md:text-5xl lg:text-[46px] text-amber-500 leading-loose md:leading-[1.6] drop-shadow-[0_0_35px_rgba(245,158,11,0.5)] mb-6">
                Project<br class="md:hidden" /><span class="md:ml-6">GlyphMotion</span>
            </h1>
        </header>

        <div class="w-full max-w-2xl content-card p-8 md:p-12 relative z-10 mt-2">
            <div class="mb-8 text-center flex flex-col items-center">
                <!-- Server Status Widget Start -->
                <div id="serverStatusWidget" class="inline-flex items-center gap-2 px-3 py-1.5 mb-4 bg-black/40 backdrop-blur-md border border-zinc-800 rounded-full cursor-help group transition-all duration-300 hover:border-zinc-500/50 shadow-lg">
                    <div class="relative flex h-2.5 w-2.5">
                        <span id="serverStatusPing" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-zinc-400 opacity-75"></span>
                        <span id="serverStatusDot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-zinc-500"></span>
                    </div>
                    <span id="serverStatusText" class="text-[10px] font-mono font-medium tracking-wider text-zinc-400 transition-colors">CHECKING...</span>
                </div>
                <!-- Server Status Widget End -->

                <h2 class="font-outfit text-3xl font-bold text-slate-100 mb-2 tracking-wide">Web Dashboard</h2>
                <p class="text-sm text-amber-500/70 mb-6 font-mono">
                    System Authentication Required
                </p>
                <div class="h-px w-16 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent mx-auto"></div>
            </div>

            <form id="adminLoginForm" class="space-y-6">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-user text-zinc-500 group-focus-within:text-amber-500 transition-colors duration-300"></i>
                </div>
                <input type="text" id="adminUsernameInput" name="username" placeholder=" "
                       class="block w-full pl-12 pr-4 py-4 bg-white/5 border border-amber-500/30 text-zinc-100 focus:outline-none focus:bg-white/10 focus:border-amber-500 focus:ring-1 focus:ring-amber-500/50 transition-all rounded-lg peer font-mono text-sm placeholder-transparent shadow-inner"
                       required autocomplete="off">
                <label for="adminUsernameInput"
                       class="absolute left-11 -top-2.5 text-xs font-mono text-amber-500 px-1 bg-transparent backdrop-blur-md transition-all 
                              peer-placeholder-shown:text-sm peer-placeholder-shown:top-4 peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:bg-transparent
                              peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-amber-400 rounded pointer-events-none">
                    Username
                </label>
            </div>
            
            <div class="password-toggle-container relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-zinc-400 group-focus-within:text-amber-500 transition-colors duration-300"></i>
                </div>
                <input type="password" id="adminPasswordInput" name="password" placeholder=" "
                       class="block w-full pl-12 pr-12 py-4 bg-white/5 border border-amber-500/30 text-zinc-100 focus:outline-none focus:bg-white/10 focus:border-amber-500 focus:ring-1 focus:ring-amber-500/50 transition-all rounded-lg peer font-mono text-sm placeholder-transparent shadow-inner"
                       required>
                <label for="adminPasswordInput"
                       class="absolute left-11 -top-2.5 text-xs font-mono text-amber-500 px-1 bg-transparent backdrop-blur-md transition-all 
                              peer-placeholder-shown:text-sm peer-placeholder-shown:top-4 peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:bg-transparent
                              peer-focus:-top-2.5 peer-focus:text-xs peer-focus:text-amber-400 rounded pointer-events-none">
                    Password
                </label>
                <span class="password-toggle-icon absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-zinc-500 hover:text-amber-400 transition-colors z-10" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </span>
            </div>

            <div class="h-6 flex items-center justify-center overflow-hidden mb-2">
                <span id="hashDisplay" class="font-mono text-[10px] text-amber-500/40 tracking-[0.2em] opacity-0 transition-opacity duration-300 pointer-events-none">
                    AWAITING_INPUT...
                </span>
            </div>
            
            <button type="submit" id="adminLoginButton"
                    class="w-full flex items-center justify-center py-3.5 px-4 rounded-lg font-outfit text-lg font-semibold bg-gradient-to-r from-amber-600/20 to-amber-500/20 border border-amber-500/30 text-amber-500 hover:from-amber-600 hover:to-amber-500 hover:text-white hover:border-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.1)] hover:shadow-[0_0_25px_rgba(245,158,11,0.35)] transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none group mt-4">
                <span class="tracking-widest uppercase text-sm">Authenticate</span>
                <i class="fas fa-arrow-right ml-3 text-sm group-hover:translate-x-1 transition-transform"></i>
            </button>
            
            <div class="mt-8 text-center">
                <a href="documentation.html" class="inline-flex items-center text-zinc-500 hover:text-amber-500 text-xs font-mono uppercase tracking-widest transition-colors">
                    <i class="fas fa-book mr-2"></i> Access Docs
                </a>
            </div>
        </form>

        <div id="loginStatusMessage" class="mt-4 p-4 info-banner error-banner rounded-lg hidden text-sm flex items-start">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6 inline-block mr-3 flex-shrink-0 text-red-400"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94l-1.72-1.72Z" clip-rule="evenodd" /></svg>
            <p id="messageText" class="font-medium"></p>
        </div>
    </div>

    <script>
        // Server Status Ping Logic
        const NGROK_PUBLIC_URL = 'https://backend.projectglyphmotion.studio'; // This value is updated by web_server_public.py
        const LOCAL_LOGIN_ENDPOINT = NGROK_PUBLIC_URL + '/login';
        const LOCAL_STATUS_ENDPOINT = NGROK_PUBLIC_URL + '/status';

        // Ping the server to check status dynamically like index.html
        async function checkServerHealth() {
            const statusDot = document.getElementById('serverStatusDot');
            const statusPing = document.getElementById('serverStatusPing');
            const statusText = document.getElementById('serverStatusText');
            const widget = document.getElementById('serverStatusWidget');

            try {
                const response = await fetch(LOCAL_STATUS_ENDPOINT, { method: 'HEAD' }); 
                
                if (response.ok) {
                    // Online State
                    statusDot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500';
                    statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75';
                    statusText.textContent = 'SYSTEM ONLINE';
                    statusText.className = 'text-[10px] font-mono font-medium tracking-wider text-emerald-400 transition-colors';
                    widget.className = 'inline-flex items-center gap-2 px-3 py-1.5 mb-4 bg-emerald-500/10 backdrop-blur-md border border-emerald-500/30 rounded-full cursor-help transition-all duration-300 shadow-[0_0_15px_rgba(16,185,129,0.15)]';
                } else {
                    throw new Error('Response not OK');
                }
            } catch (error) {
                // Offline State
                statusDot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500';
                statusPing.className = 'hidden'; // Stop pinging when offline
                statusText.textContent = 'SYSTEM OFFLINE';
                statusText.className = 'text-[10px] font-mono font-medium tracking-wider text-red-400 transition-colors';
                widget.className = 'inline-flex items-center gap-2 px-3 py-1.5 mb-4 bg-red-500/10 backdrop-blur-md border border-red-500/30 rounded-full cursor-help transition-all duration-300 shadow-[0_0_15px_rgba(239,68,68,0.15)]';
                console.error('Error checking server health:', error.message);
            }
        }
        
        // Execute status check initially and then every 10 seconds
        checkServerHealth();
        setInterval(checkServerHealth, 10000);

        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminUsernameInput = document.getElementById('adminUsernameInput');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const adminLoginButton = document.getElementById('adminLoginButton');
        const loginStatusMessage = document.getElementById('loginStatusMessage');
        const messageText = document.getElementById('messageText');
        const togglePassword = document.getElementById('togglePassword');
        const hashDisplay = document.getElementById('hashDisplay');

        // Typing Effect & Random Hash generator
        function generateRandomHash() {
            const chars = '0123456789ABCDEF';
            let hash = '';
            for (let i = 0; i < 32; i++) hash += chars[Math.floor(Math.random() * chars.length)];
            return `SHA-256 [0x${hash}]`;
        }

        let typingTimer;
        adminPasswordInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                hashDisplay.classList.remove('opacity-0');
                hashDisplay.textContent = generateRandomHash();
                
                // Clear rapid typing
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    hashDisplay.textContent = 'AWAITING_INPUT...';
                    hashDisplay.classList.add('opacity-0');
                }, 1000);
            } else {
                hashDisplay.classList.add('opacity-0');
            }
        });

        function showLoginMessage(message, isError = true) {
            messageText.textContent = message;
            loginStatusMessage.classList.remove('hidden');
            if (isError) {
                loginStatusMessage.classList.add('error-banner');
                loginStatusMessage.classList.remove('success-banner'); // Ensure success banner class is removed
                loginStatusMessage.querySelector('svg').innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94l-1.72-1.72Z" clip-rule="evenodd" />`; // Error icon
            } else {
                loginStatusMessage.classList.remove('error-banner');
                loginStatusMessage.classList.add('success-banner'); // Add a success banner class
                loginStatusMessage.style.backgroundColor = 'rgba(52, 211, 153, 0.1)'; // Greenish for success
                loginStatusMessage.style.borderColor = 'rgba(52, 211, 153, 0.3)';
                loginStatusMessage.style.borderLeftColor = '#34D399';
                loginStatusMessage.querySelector('svg').innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" />`; // Checkmark icon
            }
        }

        adminLoginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            loginStatusMessage.classList.add('hidden'); // Hide previous messages
            adminLoginButton.disabled = true; // Disable button during login attempt
            adminLoginButton.textContent = 'Logging in...';

            const username = adminUsernameInput.value;
            const password = adminPasswordInput.value;

            try {
                const response = await fetch(LOCAL_LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: username, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    showLoginMessage(`Welcome ${data.username || username} to the Web Dashboard. Redirecting...`, false);
                    // Store token, username, and session settings in localStorage
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUsername', data.username);
                    localStorage.setItem('sessionTimeoutEnabled', data.sessionTimeoutEnabled);
                    localStorage.setItem('sessionDurationDays', data.sessionDurationDays); // Store duration as well

                    // Redirect to index.html after a short delay
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showLoginMessage(data.message || 'Login failed. Please try again.');
                }
            } catch (error) {
                console.error('Error during login fetch:', error);
                showLoginMessage('Network error or server unreachable. Please try again later.');
            } finally {
                adminLoginButton.disabled = false;
                adminLoginButton.textContent = 'Login';
            }
        });

        // Toggle password visibility
        togglePassword.addEventListener('click', function () {
            const type = adminPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            adminPasswordInput.setAttribute('type', type);
            // Toggle the eye icon
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // PWA: Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Correct path for GitHub Project Pages with custom domain
                const serviceWorkerScriptPath = '/projectglyphmotion.github.io/service-worker.js';
                const serviceWorkerScope = '/projectglyphmotion.github.io/'; // Scope should match your project's base path

                navigator.serviceWorker.register(serviceWorkerScriptPath, { scope: serviceWorkerScope })
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // PWA Install Prompt Logic (New)
        let deferredPrompt; // Variable to store the event

        const pwaInstallPrompt = document.getElementById('pwaInstallPrompt');
        const installButton = pwaInstallPrompt.querySelector('.install-button');
        const dismissButton = pwaInstallPrompt.querySelector('.dismiss-button');

        // Check if the app is already installed
        function isAppInstalled() {
            // This is a common way to check if the app is running in standalone mode (installed PWA)
            return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
        }

        // Function to show the install prompt UI
        function showInstallPrompt() {
            // Only show if not already installed and deferredPrompt exists
            if (!isAppInstalled() && deferredPrompt) {
                pwaInstallPrompt.classList.add('show');
                pwaInstallPrompt.classList.remove('hide');
            }
        }

        // Function to hide the install prompt UI
        function hideInstallPrompt() {
            pwaInstallPrompt.classList.add('hide');
            // Remove 'show' after transition for proper re-appearance if needed later
            setTimeout(() => {
                pwaInstallPrompt.classList.remove('show');
            }, 300); // Match CSS transition duration
        }

        // Listen for the beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can install the app
            showInstallPrompt();
            console.log('[PWA] beforeinstallprompt fired, showing custom prompt.');
        });

        // Handle the install button click
        installButton.addEventListener('click', async () => {
            hideInstallPrompt(); // Hide the custom prompt

            if (deferredPrompt) {
                // Show the browser's native install prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                const { outcome } = await deferredPrompt.userChoice;
                // Optionally, send analytics event with outcome of user choice
                console.log(`[PWA] User response to install prompt: ${outcome}`);
                // Clear the deferredPrompt variable, as it can only be used once.
                deferredPrompt = null;

                // Hide the prompt if the user accepts or dismisses it
                if (outcome === 'accepted') {
                    showCentralMessage('GlyphMotion installed successfully! Find it on your home screen.', false);
                } else {
                    showCentralMessage('Installation declined.', true);
                }
            }
        });

        // Handle the dismiss button click
        dismissButton.addEventListener('click', () => {
            hideInstallPrompt();
            // Optionally, remember that the user dismissed the prompt
            // For example, using localStorage to not show it again for some time
            localStorage.setItem('pwaDismissedTimestamp', Date.now());
            console.log('[PWA] Install prompt dismissed.');
        });

        // Hide the prompt if the app is already installed when the page loads
        if (isAppInstalled()) {
            pwaInstallPrompt.style.display = 'none'; // Directly hide if already installed
            console.log('[PWA] App is already installed, hiding install prompt.');
        } else {
            // Check if the user previously dismissed the prompt (e.g., within the last 24 hours)
            const dismissedTimestamp = localStorage.getItem('pwaDismissedTimestamp');
            const oneDay = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
            if (dismissedTimestamp && (Date.now() - parseInt(dismissedTimestamp, 10) < oneDay)) {
                pwaInstallPrompt.style.display = 'none'; // Keep hidden if dismissed recently
                console.log('[PWA] Install prompt dismissed recently, keeping hidden.');
            }
        }
    
        // UNIVERSAL SCALING FIX
        (function () {
            const REFERENCE_WIDTH = 1920;
            const MIN_ZOOM = 0.6;
            const MAX_ZOOM = 1.0;

            function applyScaling() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                if (viewportWidth <= 1024) {
                    document.documentElement.style.zoom = '1';
                    document.documentElement.style.setProperty('--real-vh', viewportHeight + 'px');
                    return;
                }

                let zoomLevel = viewportWidth / REFERENCE_WIDTH;
                zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel));

                document.documentElement.style.zoom = zoomLevel;

                const realVh = viewportHeight / zoomLevel;
                document.documentElement.style.setProperty('--real-vh', realVh + 'px');
            }

            applyScaling();

            let resizeTimeout;
            window.addEventListener('resize', function () {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(applyScaling, 100);
            });
        })();

        // OPTIONAL DEBUG PANEL (Press Ctrl+Shift+D to toggle)
        const debugDiv = document.createElement('div');
        debugDiv.id = 'viewport-debug';
        debugDiv.style.cssText = `
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: linear-gradient(135deg, #1A1821 80%, #C5A065 100%);
            color: #C5A065;
            padding: 16px 22px 14px 22px;
            border-radius: 1.5rem;
            font-family: 'Manrope', 'Italiana', 'Dancing Script', monospace;
            font-size: 13px;
            z-index: 99999;
            display: none;
            line-height: 1.7;
            border: 1.5px solid #C5A065;
            box-shadow: 0 8px 32px -8px rgba(197,160,101,0.18), 0 2px 8px rgba(26,24,33,0.12);
            backdrop-filter: blur(4px);
            transition: box-shadow 0.3s, background 0.3s;
            letter-spacing: 0.02em;
            min-width: 260px;
            max-width: 340px;
            text-shadow: 0 1px 2px #18181844;
        `;
        document.body.appendChild(debugDiv);

        function updateDebugPanel() {
            debugDiv.innerHTML = `
                <strong>Viewport:</strong> ${window.innerWidth} x ${window.innerHeight} <br>
                <strong>Zoom:</strong> ${document.documentElement.style.zoom || 1} <br>
                <strong>DPR:</strong> ${window.devicePixelRatio}
            `;
        }
        
        window.addEventListener('resize', updateDebugPanel);
        updateDebugPanel();

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'd') {
                e.preventDefault();
                debugDiv.style.display = debugDiv.style.display === 'none' ? 'block' : 'none';
            }
        });

    </script>
</body>
</html>
